services:
  backend:
    build:
      context: ./backend/organisational_layer
      dockerfile: Dockerfile
      target: dev
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-chainiq}
      DB_PASSWORD: ${MYSQL_PASSWORD:-chainiq}
      DB_NAME: ${MYSQL_DATABASE:-chainiq}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/organisational_layer:/service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:?BACKEND_INTERNAL_URL is required}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      NODE_ENV: development
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next

volumes:
  frontend_node_modules:
  frontend_next_cache:
