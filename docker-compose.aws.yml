services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/aws.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:?BACKEND_INTERNAL_URL is required}
      NEXT_PUBLIC_API_BASE_URL: /api
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend/organisational_layer
      dockerfile: Dockerfile
      target: runtime
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  migrator:
    image: python:3.14-slim
    working_dir: /workspace/database_init
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    volumes:
      - .:/workspace
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && python migrate.py"
    profiles: ["tools"]
    restart: "no"

  # Optional local DB fallback (for non-RDS usage on EC2)
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chainiq}
      MYSQL_USER: ${MYSQL_USER:-chainiq}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chainiq}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 5s
      timeout: 5s
      retries: 25
      start_period: 15s
    profiles: ["localdb"]
    restart: unless-stopped

volumes:
  mysql_data:
