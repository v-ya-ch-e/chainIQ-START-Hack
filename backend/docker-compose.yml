services:
  organisational-layer:
    build: ./organisational_layer
    ports:
      - "8000:8000"
    env_file:
      - ./organisational_layer/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chainiq
    restart: unless-stopped

  logical-layer:
    build: ./logical_layer
    ports:
      - "8080:8080"
    env_file:
      - ./logical_layer/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      organisational-layer:
        condition: service_healthy
    networks:
      - chainiq
    restart: unless-stopped

networks:
  chainiq:
    name: chainiq-network
    external: true
